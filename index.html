<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - La Rosa Náutica</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Raleway', sans-serif;
        }

        .hero-background {
            /* Imagen de fondo inspirada en el litoral de Miraflores */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                              url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* EL CUADRO DE LA INVITACIÓN */
        .tarjeta-invitacion {
            background: rgba(255, 255, 255, 0.85); /* Blanco semi-transparente */
            backdrop-filter: blur(10px); /* Efecto de vidrio borroso */
            padding: 60px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: #1a2a3a; /* Texto oscuro para que resalte en el cuadro blanco */
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            letter-spacing: 6px;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: #bfa37e; /* Dorado suave */
        }

        .quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #5a5a5a;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            color: #1a2a3a;
        }

        .divisor {
            width: 50px;
            height: 1px;
            background-color: #bfa37e;
            margin: 0 auto 30px;
        }

        .detalles-evento {
            margin-bottom: 40px;
            font-size: 0.95rem;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        /* Botón de WhatsApp estilizado */
        .btn-whatsapp {
            display: inline-block;
            padding: 18px 45px;
            background-color: #1a2a3a; /* Azul Náutico */
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #bfa37e; /* Cambia a dorado al pasar el mouse */
            transform: translateY(-2px);
        }

        /* Ajustes para celulares */
        @media (max-width: 600px) {
            .tarjeta-invitacion { padding: 40px 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hero-background">
        <div class="tarjeta-invitacion">
            <div class="header-logo">La Rosa Náutica</div>
            
            <p class="quote">“Un verdadero placer para los sentidos”</p>
            <h1>Una velada inolvidable</h1>
            
            <div class="divisor"></div>

            <div class="detalles-evento">
                <p>TE ESPERAMOS ESTE</p>
                <p><strong>SÁBADO 19 DE ABRIL</strong></p>
                <p>A LAS 20:30 HORAS</p>
                <p>ESPIGÓN 4 DE MIRAFLORES, LIMA</p>
            </div>

            <a href="https://wa.me/+51941761696?text=¡Hola!%20Acepto%20con%20gusto%20la%20invitación" class="btn-whatsapp">
                Confirmar Asistencia
            </a>
        </div>
    </div>

</body>
</html>
