<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial - La Rosa Náutica</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de colores para fácil ajuste */
        :root {
            --azul-marino: #002344;
            --dorado: #c5a059;
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            font-family: 'Raleway', sans-serif;
        }

        .invitacion-card {
            background-color: var(--blanco);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            border: 2px solid var(--dorado);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Borde decorativo interno */
        .invitacion-card::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--dorado);
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--azul-marino);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .divisor {
            width: 50px;
            height: 2px;
            background-color: var(--dorado);
            margin: 20px auto;
        }

        .detalle {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .info-importante {
            color: var(--azul-marino);
            font-weight: bold;
            margin: 20px 0;
        }

        .boton-mapa {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: var(--azul-marino);
            color: var(--blanco);
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .boton-mapa:hover {
            background-color: var(--dorado);
        }
    </style>
</head>
<body>

    <div class="invitacion-card">
        <h1>La Rosa Náutica</h1>
        <div class="divisor"></div>
        <p class="detalle">Tenemos el placer de invitarte a una cena exclusiva frente al mar.</p>
        
        <div class="info-importante">
            <p>Sábado, 18 de Abril</p>
            <p>08:00 PM</p>
            <p>Espigón 4 de Miraflores, Lima</p>
        </div>

        <p class="detalle">Código de vestimenta: Formal</p>
        
        <a href="https://maps.google.com" target="_blank" class="boton-mapa">Ver Ubicación</a>
    </div>

</body>
</html>
