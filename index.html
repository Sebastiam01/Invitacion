<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial - La Rosa Náutica</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Raleway', sans-serif;
            color: white;
        }

        /* Contenedor del fondo con la imagen tipo La Rosa Náutica */
        .hero-background {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1353&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            letter-spacing: 5px;
            font-size: 1.2rem;
            position: absolute;
            top: 40px;
            text-transform: uppercase;
        }

        .content {
            max-width: 800px;
        }

        .quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .descripcion {
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 30px;
            line-height: 1.6;
            font-weight: 300;
        }

        .detalles-evento {
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Estilo del botón de WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        .btn-whatsapp:hover {
            background: white;
            color: #333;
        }

        /* Responsivo para celulares */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .header-logo { top: 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="hero-background">
        <div class="header-logo">Rosa Náutica</div>

        <div class="content">
            <p class="quote">— "Verdadero placer para los sentidos"</p>
            <h1>Reserva una experiencia sobre el mar</h1>
            
            <p class="descripcion">
                Te invitamos a disfrutar de una gastronomía marina excepcional en un ambiente único.
            </p>

            <div class="detalles-evento">
                <p>SÁBADO 19 DE ABRIL | 20:30 HRS</p>
                <p>ESPIGÓN 4, MIRAFLORES</p>
            </div>

            <a href="https://wa.me/TU_NUMERO_AQUI?text=Acepto%20la%20invitación" class="btn-whatsapp">
                Confirmar Asistencia
            </a>
        </div>
    </div>

</body>
</html>
