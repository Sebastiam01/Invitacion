<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - La Rosa Náutica</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores extraídos del sitio oficial */
            --fondo-crema: #fdfcf9; 
            --azul-nautico: #1a2a3a;
            --dorado-suave: #bfa37e;
            --texto-suave: #5a5a5a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--fondo-crema); /* El color de fondo de la web */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Raleway', sans-serif;
        }

        /* Contenedor con efecto de papel elegante */
        .invitacion {
            background-color: white;
            width: 85%;
            max-width: 500px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            position: relative;
        }

        /* El logo estilo La Rosa Náutica */
        .logo-texto {
            font-family: 'Playfair Display', serif;
            color: var(--azul-nautico);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .sub-logo {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--dorado-suave);
            margin-bottom: 30px;
        }

        .divisor {
            width: 40px;
            height: 1px;
            background-color: var(--dorado-suave);
            margin: 20px auto;
        }

        .mensaje {
            font-style: italic;
            font-family: 'Playfair Display', serif;
            color: var(--texto-suave);
            font-size: 1.2rem;
            margin: 30px 0;
        }

        .datos {
            color: var(--azul-nautico);
            line-height: 1.8;
            font-weight: 400;
        }

        .boton-reserva {
            margin-top: 40px;
            display: inline-block;
            padding: 15px 35px;
            border: 1px solid var(--azul-nautico);
            color: var(--azul-nautico);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .boton-reserva:hover {
            background-color: var(--azul-nautico);
            color: white;
        }
    </style>
</head>
<body>

    <div class="invitacion">
        <div class="logo-texto">La Rosa Náutica</div>
        <div class="sub-logo">RESTAURANTE</div>
        
        <div class="divisor"></div>
        
        <p class="mensaje">“Un verdadero placer para los sentidos”</p>
        
        <div class="datos">
            <p>TE ESPERAMOS PARA UNA EXPERIENCIA MÁGICA</p>
            <p><strong>SÁBADO 19 DE ABRIL</strong></p>
            <p>A LAS 20:30 HORAS</p>
            <p>ESPIGÓN 4, MIRAFLORES</p>
        </div>

        <a href="https://larosanautica.com/reservas-restaurante/" class="boton-reserva">Confirmar Asistencia</a>
    </div>

</body>
</html>
