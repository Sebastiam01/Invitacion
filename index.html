<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Cumpleaños - La Rosa Náutica</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Raleway', sans-serif;
        }

        /* Contenedor del fondo con la imagen del océano */
        .hero-background {
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                              url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Cuadro de la invitación con transparencia */
        .tarjeta-invitacion {
            background: rgba(255, 255, 255, 0.6); /* Transparencia equilibrada */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Para Safari */
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            color: #1a2a3a; /* Azul náutico oscuro */
        }

        /* Título de La Rosa Náutica */
        .header-logo {
            font-family: 'Playfair Display', serif;
            letter-spacing: 12px;
            font-size: 2rem;
            text-transform: uppercase;
            color: #001a33;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        /* ESTILO CORREGIDO DEL LOGO (SIN FONDO BLANCO Y PEQUEÑO) */
        .logo-imagen {
            width: 45px;                 /* Más pequeño y elegante */
            height: auto;
            margin: 0 auto 15px;
            display: block;
            mix-blend-mode: multiply;    /* Elimina el fondo blanco */
            filter: contrast(1.1);       /* Asegura que el negro sea negro */
        }

        .quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #444;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            color: #1a2a3a;
        }

        .divisor {
            width: 40px;
            height: 1px;
            background-color: #bfa37e; /* Dorado suave */
            margin: 0 auto 25px;
        }

        .detalles-evento {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #1a2a3a;
        }

        .detalles-evento Strong {
            font-weight: 600;
        }

        .dress-code {
            font-size: 1rem;
            margin-top: 10px;
            color: #333;
        }

        /* UBICACIÓN MÁS PEQUEÑA (CORRECCIÓN SOLICITADA) */
        .ubicacion {
            font-size: 0.85rem;          /* Mucho más pequeño */
            letter-spacing: 1px;
            margin-top: 10px;
            text-transform: uppercase;
            color: #555;                 /* Color más sutil */
        }

        /* Botón Confirmar Asistencia */
        .btn-whatsapp {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #1a2a3a;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
        }

        .btn-whatsapp:hover {
            background-color: #bfa37e; /* Cambia a dorado suave */
            transform: translateY(-2px);
        }

        /* Adaptación para dispositivos móviles */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .header-logo { font-size: 1.5rem; letter-spacing: 6px; }
            .tarjeta-invitacion { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="hero-background">
        <div class="tarjeta-invitacion">
            <div class="header-logo">La Rosa Náutica</div>
            
            <img src="logo.png" alt="Logo" class="logo-imagen">

            <p class="quote">“Un verdadero placer para los sentidos”</p>
            <h1>Un cumpleaños diferente</h1>
            
            <div class="divisor"></div>

            <div class="detalles-evento">
                <p>IREMOS ESTE</p>
                <p><strong>SÁBADO 11 DE ABRIL</strong></p>
                <p>A LAS 17:30 HORAS</p>
                <p class="dress-code">Dress Code: Sport elegante</p>
                <p class="ubicacion">Espigón 4 de Miraflores, Lima</p>
            </div>

            <a href="https://api.whatsapp.com/send?phone=TU_NUMERO_AQUI&text=Hola!%20Acepto%20la%20invitacion" class="btn-whatsapp">
                Confirmar Asistencia
            </a>
        </div>
    </div>

</body>
</html>
